# ============================================================================
# FinaCES API — Nginx Reverse Proxy (VPS)
# Fichier à copier dans : /etc/nginx/sites-available/finaces-api
# Certbot modifiera ce fichier pour ajouter la config SSL (ne pas gérer manuellement)
#
# REMPLACER : staging.finaces.io → votre domaine réel
# ============================================================================

# Gzip global
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_types
    application/json
    application/javascript
    text/plain
    text/css
    text/xml
    text/javascript;

server {
    listen 80;
    server_name staging.finaces.io;

    # ------------------------------------------------------------------
    # Healthcheck direct — bypass le proxy applicatif
    # Permet au load balancer / uptime monitor de vérifier le VPS sans
    # dépendre du container Docker.
    # ------------------------------------------------------------------
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }

    # ------------------------------------------------------------------
    # Reverse proxy vers le container API (port 8000 exposé par Docker)
    # ------------------------------------------------------------------
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Headers standard reverse proxy
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (si nécessaire pour futures fonctions live)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Sécurité — headers ajoutés sur toutes les réponses de l'API
        add_header X-Frame-Options          "DENY"                              always;
        add_header X-Content-Type-Options   "nosniff"                           always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;

        # HSTS — Certbot l'ajoutera aussi, on le prépose ici pour le bloc HTTP
        # (sera déplacé dans le bloc HTTPS par Certbot)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}

# NOTE : Le bloc server { listen 443 ssl; ... } sera généré et géré
# automatiquement par Certbot après : certbot --nginx -d staging.finaces.io
# Ne pas éditer la section SSL à la main.
