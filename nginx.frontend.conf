# nginx.frontend.conf
# Config Nginx optimisée pour Angular SPA avec cache control correct
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # index.html : jamais mis en cache
    # Angular change les hashes des bundles à chaque build,
    # mais index.html lui-même n'a pas de hash → doit toujours être revalidé
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Bundles JS/CSS/assets avec hash dans le nom → cache immutable 1 an
    location ~* \.(js|css|png|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — toutes les routes Angular retombent sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
