services:

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL 15
  # ─────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finaces-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - finaces-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ─────────────────────────────────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    # ports:
    #  - "8000:8000"  (Plus besoin d'exposer le port à l'hôte, Traefik s'en charge !)
    networks:
      - finaces-net
      - root_default
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      # API v1 Router
      - "traefik.http.routers.finaces-api.entrypoints=websecure"
      - "traefik.http.routers.finaces-api.rule=Host(`staging.adsa.cloud`) && PathPrefix(`/api`)"
      - "traefik.http.routers.finaces-api.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.finaces-api.priority=100"
      # Health Check Router
      - "traefik.http.routers.finaces-health.entrypoints=websecure"
      - "traefik.http.routers.finaces-health.rule=Host(`staging.adsa.cloud`) && PathPrefix(`/health`)"
      - "traefik.http.routers.finaces-health.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.finaces-health.priority=100"
      # Auth Router (legacy support)
      - "traefik.http.routers.finaces-auth.entrypoints=websecure"
      - "traefik.http.routers.finaces-auth.rule=Host(`staging.adsa.cloud`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.finaces-auth.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.finaces-auth.priority=100"
      - "traefik.http.services.finaces-api.loadbalancer.server.port=8000"

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend Serveur Statique (Traefik route "/")
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - /var/www/finaces-staging:/usr/share/nginx/html
      - ./nginx.frontend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.routers.finaces-front.rule=Host(`staging.adsa.cloud`)"
      - "traefik.http.routers.finaces-front.entrypoints=websecure"
      - "traefik.http.routers.finaces-front.tls.certresolver=mytlschallenge"
      - "traefik.http.services.finaces-front.loadbalancer.server.port=80"

# ─────────────────────────────────────────────────────────────────────────
# Réseaux et Volumes
# ─────────────────────────────────────────────────────────────────────────
networks:
  finaces-net:
    name: finaces-net
  root_default:
    external: true

volumes:
  postgres_data:
