name: CI/CD — FinaCES Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

# Empêche deux déploiements simultanés — annule le run précédent si un nouveau arrive
concurrency:
  group: deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Tests
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: finaces_test
          POSTGRES_USER: finaces
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd "pg_isready -U finaces -d finaces_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      ENVIRONMENT: test
      SECRET_KEY: ci-secret-key-not-used-in-production-32c
      DATABASE_URL: postgresql+asyncpg://finaces:testpassword@localhost:5432/finaces_test
      REDIS_URL: redis://localhost:6379/0
      TEST_DATABASE_URL: postgresql+asyncpg://finaces:testpassword@localhost:5432/finaces_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          if find tests -name "test_*.py" -quit 2>/dev/null; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No tests found yet — step skipped" && exit 0
          fi

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Build & Push vers GHCR
# ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      sha_short: ${{ steps.sha.outputs.sha_short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Deploy sur VPS (SSH)
# Tourne uniquement sur push main ou workflow_dispatch — jamais sur PR
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/finaces/finaces-api
            echo "📥 Pulling latest image from GHCR..."
            docker compose -f docker-compose.prod.yml pull api
            echo "🔄 Restarting api service..."
            docker compose -f docker-compose.prod.yml up -d --no-build
            echo "🧹 Pruning unused images..."
            docker image prune -f
            echo "✅ Deploy complete."

      - name: 🩺 Smoke test — /health must return 200
        run: |
          echo "Waiting 10s for the container to be ready..."
          sleep 10
          curl --fail --silent --max-time 10 https://staging.finaces.io/health | jq .

