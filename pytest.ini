# ============================================================================
# FinaCES API - Pytest Configuration
# Python: >=3.11
# Stack: pytest-asyncio, httpx, factory-boy, faker
# ============================================================================

[pytest]
# Minimum version
minversion = 7.0

# Test paths
testpaths = tests

# Python files/functions detection
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async configuration (CRITICAL for SQLAlchemy 2.0 async)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

# Markers (for test categorization)
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (DB, external services)
    slow: Slow tests (> 1 second)
    api: API route tests
    engine: Engine logic tests
    ia: AI module tests
    requires_db: Tests requiring database connection
    requires_model: Tests requiring trained ML model

# Output formatting
addopts =
    # Verbose output
    -v
    # Show test durations
    --durations=10
    # Show local variables in tracebacks
    --showlocals
    # Coverage options
    --cov=app
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-fail-under=53
    # Warnings
    -W ignore::DeprecationWarning
    -W ignore::PendingDeprecationWarning
    # Parallel execution (optional, comment out for debugging)
    # -n auto
    # Stop on first failure (useful for debugging)
    # -x
    # Drop into debugger on failure
    # --pdb

# Log configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] [%(filename)s:%(lineno)d] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Environment variables for testing
env =
    TESTING=1
    DATABASE_URL=postgresql+asyncpg://finaces:password@localhost:5433/finaces_test

# Timeout for tests (prevent hanging async operations)
timeout = 60
timeout_method = thread

# Disable cacheprovider for CI environments
cache_dir = .pytest_cache

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
